<ul class="record-list chronicle-list">
    {% for step in recent_steps %}
    <li>
        <a href="{% url 'campaign:step_log_detail' step_id=step.id %}">{{ step.step_type|title }} / {{ step.action_type|title }}</a>
        <span class="chronicle-note">{{ step.narrative|truncatechars:96 }}</span>
        <span class="chronicle-time">{{ step.created_at }}</span>
    </li>
    {% empty %}
    <li>No events logged yet.</li>
    {% endfor %}
</ul>
