services:
  web_debug:
    image: whmrqst-django-debug
    build:
      context: ../
      dockerfile: ./docker/Dockerfile
    command: >
      sh -c "python -m pip install --no-cache-dir debugpy &&
      python manage.py migrate &&
      python -Xfrozen_modules=off -m debugpy --listen 0.0.0.0:5679 --wait-for-client manage.py runserver 0.0.0.0:8000"
    ports:
      - "${DEBUG_PORT:-8000}:8000"
      - "5679:5679"
    environment:
      - DJANGO_DEBUG=true
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-local-dev-only}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - PYDEVD_DISABLE_FILE_VALIDATION=1
      - POSTGRES_HOST=db_debug
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-questbetween}
      - POSTGRES_USER=${POSTGRES_USER:-questbetween}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-questbetween}
      - POSTGRES_CONNECT_TIMEOUT=${POSTGRES_CONNECT_TIMEOUT:-5}
    depends_on:
      db_debug:
        condition: service_healthy
    volumes:
      - ../:/app
    networks:
      - internal_network_debug
      - default

  db_debug:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-questbetween}
      - POSTGRES_USER=${POSTGRES_USER:-questbetween}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-questbetween}
    volumes:
      - postgres_data_debug:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-questbetween} -d ${POSTGRES_DB:-questbetween}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal_network_debug

volumes:
  postgres_data_debug:

networks:
  internal_network_debug:
    internal: true
